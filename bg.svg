<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#fdf6ec"/>

  <!-- CUPCAKE top-left -->
  <g transform="translate(55,60)" opacity="0.18">
    <!-- liner -->
    <path d="M-18,0 Q-20,20 -14,28 L14,28 Q20,20 18,0 Z" fill="#c8893a"/>
    <line x1="-8" y1="2" x2="-10" y2="26" stroke="#a06d28" stroke-width="1.5"/>
    <line x1="0" y1="1" x2="0" y2="28" stroke="#a06d28" stroke-width="1.5"/>
    <line x1="8" y1="2" x2="10" y2="26" stroke="#a06d28" stroke-width="1.5"/>
    <!-- frosting blob -->
    <ellipse cx="0" cy="-2" rx="16" ry="10" fill="#c8893a"/>
    <ellipse cx="-8" cy="-8" rx="9" ry="7" fill="#c8893a"/>
    <ellipse cx="8" cy="-9" rx="9" ry="7" fill="#c8893a"/>
    <ellipse cx="0" cy="-15" rx="7" ry="6" fill="#c8893a"/>
    <!-- cherry -->
    <circle cx="0" cy="-20" r="4" fill="#a06d28"/>
    <line x1="0" y1="-20" x2="3" y2="-26" stroke="#7a8c6e" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- LAYER CAKE top-right -->
  <g transform="translate(310,55)" opacity="0.18">
    <!-- bottom layer -->
    <rect x="-28" y="10" width="56" height="16" rx="3" fill="#c8893a"/>
    <!-- middle layer -->
    <rect x="-22" y="-8" width="44" height="16" rx="3" fill="#a06d28"/>
    <!-- top layer -->
    <rect x="-16" y="-24" width="32" height="14" rx="3" fill="#c8893a"/>
    <!-- frosting drips -->
    <path d="M-28,10 Q-24,4 -20,10" fill="#fdf6ec" opacity="0.6"/>
    <path d="M-10,10 Q-6,3 -2,10" fill="#fdf6ec" opacity="0.6"/>
    <path d="M10,10 Q14,3 18,10" fill="#fdf6ec" opacity="0.6"/>
    <!-- candles -->
    <rect x="-10" y="-36" width="4" height="12" rx="1" fill="#7a8c6e"/>
    <rect x="6" y="-38" width="4" height="14" rx="1" fill="#c8893a"/>
    <ellipse cx="-8" cy="-37" rx="2" ry="3" fill="#f5e9d0"/>
    <ellipse cx="8" cy="-39" rx="2" ry="3" fill="#f5e9d0"/>
  </g>

  <!-- PIE center -->
  <g transform="translate(195,185)" opacity="0.18">
    <!-- pie dish -->
    <ellipse cx="0" cy="14" rx="34" ry="8" fill="#a06d28"/>
    <!-- filling -->
    <ellipse cx="0" cy="0" rx="30" ry="18" fill="#c8893a"/>
    <!-- crust top -->
    <path d="M-30,0 Q-20,-24 0,-26 Q20,-24 30,0 Z" fill="#a06d28"/>
    <!-- lattice lines -->
    <line x1="-14" y1="-24" x2="-6" y2="0" stroke="#fdf6ec" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="-26" x2="0" y2="0" stroke="#fdf6ec" stroke-width="2" opacity="0.5"/>
    <line x1="14" y1="-24" x2="6" y2="0" stroke="#fdf6ec" stroke-width="2" opacity="0.5"/>
    <line x1="-22" y1="-14" x2="22" y2="-14" stroke="#fdf6ec" stroke-width="2" opacity="0.5"/>
    <line x1="-26" y1="-6" x2="26" y2="-6" stroke="#fdf6ec" stroke-width="2" opacity="0.5"/>
    <!-- crimped edge -->
    <path d="M-30,0 Q-26,-4 -22,0 Q-18,-4 -14,0 Q-10,-4 -6,0 Q-2,-4 2,0 Q6,-4 10,0 Q14,-4 18,0 Q22,-4 26,0 Q28,-2 30,0" fill="none" stroke="#a06d28" stroke-width="2.5"/>
  </g>

  <!-- CROISSANT bottom-left -->
  <g transform="translate(65,300) rotate(-10)" opacity="0.18">
    <path d="M-30,8 Q-20,-18 0,-16 Q20,-18 30,8 Q20,22 10,16 Q0,20 -10,16 Q-20,22 -30,8Z" fill="#c8893a"/>
    <path d="M-18,6 Q-10,-12 0,-12 Q10,-12 18,6" fill="none" stroke="#a06d28" stroke-width="2" stroke-linecap="round"/>
    <path d="M-8,12 Q0,0 8,12" fill="none" stroke="#a06d28" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- DONUT bottom-right -->
  <g transform="translate(320,305)" opacity="0.18">
    <!-- donut body -->
    <circle cx="0" cy="0" r="28" fill="#c8893a"/>
    <!-- hole -->
    <circle cx="0" cy="0" r="11" fill="#fdf6ec"/>
    <!-- icing drip -->
    <path d="M-20,-18 Q-8,-30 8,-28 Q22,-24 24,-10 Q14,-16 6,-28 Q-4,-32 -16,-22 Z" fill="#a06d28"/>
    <!-- sprinkles -->
    <rect x="-6" y="-24" width="8" height="3" rx="1.5" fill="#7a8c6e" transform="rotate(30,-2,-22)"/>
    <rect x="10" y="-20" width="8" height="3" rx="1.5" fill="#f5e9d0" transform="rotate(-20,14,-18)"/>
    <rect x="16" y="-8" width="7" height="3" rx="1.5" fill="#7a8c6e" transform="rotate(50,19,-6)"/>
    <rect x="-18" y="-10" width="7" height="3" rx="1.5" fill="#f5e9d0" transform="rotate(-40,-14,-8)"/>
  </g>

  <!-- MACARON left-center -->
  <g transform="translate(48,198)" opacity="0.18">
    <ellipse cx="0" cy="-12" rx="18" ry="11" fill="#c8893a"/>
    <ellipse cx="-2" cy="-12" rx="16" ry="4" fill="#a06d28" opacity="0.4"/>
    <rect x="-18" y="-4" width="36" height="7" fill="#a06d28" opacity="0.6"/>
    <ellipse cx="0" cy="7" rx="18" ry="11" fill="#c8893a"/>
    <ellipse cx="-2" cy="7" rx="16" ry="4" fill="#a06d28" opacity="0.4"/>
  </g>

  <!-- MUFFIN right-center -->
  <g transform="translate(348,190)" opacity="0.18">
    <!-- liner -->
    <path d="M-14,4 Q-16,22 -10,28 L10,28 Q16,22 14,4 Z" fill="#a06d28"/>
    <line x1="-5" y1="6" x2="-6" y2="26" stroke="#c8893a" stroke-width="1.2" opacity="0.6"/>
    <line x1="5" y1="6" x2="6" y2="26" stroke="#c8893a" stroke-width="1.2" opacity="0.6"/>
    <!-- muffin top -->
    <ellipse cx="0" cy="-4" rx="18" ry="12" fill="#c8893a"/>
    <ellipse cx="-6" cy="-10" rx="10" ry="7" fill="#c8893a"/>
    <ellipse cx="6" cy="-11" rx="10" ry="7" fill="#c8893a"/>
    <!-- blueberries -->
    <circle cx="-4" cy="-6" r="3" fill="#6b4226"/>
    <circle cx="6" cy="-4" r="3" fill="#6b4226"/>
    <circle cx="0" cy="-14" r="2.5" fill="#6b4226"/>
  </g>

  <!-- Small stars scattered -->
  <g opacity="0.2">
    <g transform="translate(160,50)">
      <line x1="0" y1="-7" x2="0" y2="7" stroke="#c8893a" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="-7" y1="0" x2="7" y2="0" stroke="#c8893a" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="-5" y1="-5" x2="5" y2="5" stroke="#c8893a" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="5" y1="-5" x2="-5" y2="5" stroke="#c8893a" stroke-width="1.2" stroke-linecap="round"/>
    </g>
    <g transform="translate(240,355)">
      <line x1="0" y1="-7" x2="0" y2="7" stroke="#c8893a" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="-7" y1="0" x2="7" y2="0" stroke="#c8893a" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="-5" y1="-5" x2="5" y2="5" stroke="#c8893a" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="5" y1="-5" x2="-5" y2="5" stroke="#c8893a" stroke-width="1.2" stroke-linecap="round"/>
    </g>
    <g transform="translate(380,380)">
      <line x1="0" y1="-5" x2="0" y2="5" stroke="#c8893a" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-5" y1="0" x2="5" y2="0" stroke="#c8893a" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <g transform="translate(18,370)">
      <line x1="0" y1="-5" x2="0" y2="5" stroke="#c8893a" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-5" y1="0" x2="5" y2="0" stroke="#c8893a" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Tiny dots -->
  <circle cx="200" cy="90" r="3" fill="#c8893a" opacity="0.15"/>
  <circle cx="130" cy="140" r="2.5" fill="#a06d28" opacity="0.15"/>
  <circle cx="268" cy="130" r="2.5" fill="#c8893a" opacity="0.15"/>
  <circle cx="150" cy="310" r="3" fill="#a06d28" opacity="0.15"/>
  <circle cx="270" cy="270" r="2.5" fill="#c8893a" opacity="0.15"/>
  <circle cx="100" cy="355" r="2" fill="#c8893a" opacity="0.15"/>
  <circle cx="355" cy="130" r="2" fill="#a06d28" opacity="0.15"/>
</svg>
